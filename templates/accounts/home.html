{% extends 'base.html' %}

{% block content %}
<div class="text-center mt-5">
    <h1>Welcome to Treading Market</h1>

    {% if user.is_authenticated %}
        <p class="lead">Hello, {{ user.first_name }} 👋</p>
    {% else %}
        <p class="lead">Please login or register to continue.</p>
    {% endif %}
</div>
{% endblock %}
