{% extends 'base2.html' %}

{% block content %}
<div class="container justify-content-center align-content-center">
    <div class="row mt-4">
        <div class="col-xl-4">
            <!-- Profile picture card-->
            <form method="POST" enctype="multipart/form-data" class="card mb-4 mb-xl-0">
                {% csrf_token %}
                <div class="card-header">Profile Picture</div>
                <div class="card-body text-center">
                    <!-- Profile picture image-->
                    <img class="img-account-profile rounded-circle mb-2 border border-2" src="{{ profinfo.image.url }}" alt="Profile Image">
                    <!-- Profile picture help block-->
                    <div class="small font-italic text-muted mb-4">JPG or PNG no larger than 5 MB</div>
                    <!-- Profile picture upload button-->
                    <input type="file" name="profile_image" id="id_profile_image" class="form-control m-2" accept=".jpg, .jpeg, .png">
                    <button class="btn btn-outline-primary"  type="submit" name="profile_image">Upload new image</button>
                </div>
            </form>
        </div>
        <div class="col-xl-8">
            <!-- Account details card-->
            <form method="POST" class="card mb-4">
                {% csrf_token %}
                <div class="card-header">Account Details</div>
                <div class="card-body">
                    <form>
                        <!-- Form Group (username)-->
                        <div class="mb-3">
                            <label class="small mb-1" for="inputUsername">Username (how your name will appear to other users on the site)</label>
                            <input class="form-control" id="inputUsername" type="text" name = 'username' placeholder="Enter your username" value="{{ user.username }}">
                        </div>
                        <!-- Form Row-->
                        <div class="row gx-3 mb-3">
                            <!-- Form Group (first name)-->
                            <div class="col-md-6">
                                <label class="small mb-1" for="inputFirstName">First name</label>
                                <input class="form-control" id="inputFirstName" type="text" name = 'first_name' placeholder="Enter your first name" value="{{ user.first_name }}">
                            </div>
                            <!-- Form Group (last name)-->
                            <div class="col-md-6">
                                <label class="small mb-1" for="inputLastName">Last name</label>
                                <input class="form-control" id="inputLastName" type="text" name = 'last_name' placeholder="Enter your last name" value="{{ user.last_name }}">
                            </div>
                        </div>
                        <!-- Form Group (Address) -->
                        <div class="mb-3">
                            <label class="small mb-1" for="address">Address / Location</label>
                            <input class="form-control" id="address" name = 'address' placeholder="Enter your Address" value="{{ profinfo.address }}">
                        </div>
                        <!-- Form Group (email address)-->
                        <div class="mb-3">
                            <label class="small mb-1" for="inputEmailAddress">Email address</label>
                            <input class="form-control" id="inputEmailAddress" type="email" name = 'email' placeholder="Enter your email address" value="{{ user.email }}">
                        </div>
                        <!-- Form Row-->
                        <div class="row gx-3 mb-3">
                            <!-- Form Group (phone number)-->
                            <div class="col-md-6">
                                <label class="small mb-1" for="inputPhone">Phone number</label>
                                <input class="form-control" 
                                    id="inputPhone" 
                                    type="tel" 
                                    name="phone_number" 
                                    placeholder="1234567890" 
                                    pattern="[0-9]{10}" 
                                    title="Please enter in 123-456-7890 format"
                                    value="{{ profinfo.phone_number }}">
                            </div>
                            <!-- Form Group (birthday)-->
                            <div class="col-md-6">
                                <label class="small mb-1" for="inputBirthday">Birthday</label>
                                <input class="form-control" 
                                    id="inputBirthday" 
                                    type="date" 
                                    name="date_of_birth" 
                                    value="{{ profinfo.date_of_birth|date:'Y-m-d' }}"
                                    required>
                            </div>
                        </div>
                        <!-- Save changes button-->
                        <button class="btn btn-primary" type="submit" name = 'profile_info'>Save changes</button>
                    </form>
                </div>
            </form>
        </div>
    </div>
</div>    
{% endblock content %}
