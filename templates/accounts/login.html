{% extends 'base.html' %}

{% block title %}Login | TreadMarket{% endblock title %}

{% block content %}
<div class="card auth-card shadow-lg border-0">
    <div class="card-header bg-white border-0 pt-4">
        <h3 class="text-center fw-bold text-dark mb-0">Login</h3>
        <p class="text-center text-muted small">Access your TreadMarket dashboard</p>
    </div>

    <div class="card-body px-4 pb-4">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold small text-uppercase text-muted">Username or Email</label>
                <input type="text" 
                       name="login_input" 
                       class="form-control form-control-lg border-2 shadow-none" 
                       style="font-size: 0.95rem;"
                       placeholder="Enter Username or Email ID" 
                       value="person1" 
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold small text-uppercase text-muted">Password</label>
                <input type="password" 
                       name="password" 
                       class="form-control form-control-lg border-2 shadow-none" 
                       style="font-size: 0.95rem;"
                       placeholder="Enter Password" 
                       value="person1@123" 
                       required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small text-muted" for="rememberMe">
                        Remember me
                    </label>
                </div>
                <a href="{% url 'forgot_password' %}" class="text-decoration-none small fw-bold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm rounded-3 mb-3">
                Login
            </button>
            
            <div class="position-relative my-4">
                <hr class="text-muted">
                <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">OR</span>
            </div>

            <div class="text-center">
                <p class="small text-muted mb-3">Don't have an account?</p>
                <a href="{% url 'accountRegister' %}" class="btn btn-outline-dark w-100 py-2 fw-bold rounded-3">
                    Register New Account
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
