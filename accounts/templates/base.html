<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tread Market</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Tread Market</a>

        <div>
            {% if user.is_authenticated %}
                <a href="#" class="btn btn-success me-2">{{ user.username }}</a>
                <a href="{% url 'accountLogout' %}" class="btn btn-danger">Logout</a>
            {% else %}
                <a href="{% url 'accountLogin' %}" class="btn btn-outline-light me-2">Login</a>
                <a href="{% url 'accountRegister' %}" class="btn btn-warning">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
