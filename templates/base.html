<!doctype html>
<html lang="en">
    <head>
        <title>
            {% block title %} TreadMarket {% endblock title %} 
        </title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
        
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

        <style>
            body {
                font-family: 'Inter', sans-serif;
                /* Soft modern gradient background */
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
            
            main {
                flex: 1;
                display: flex;
                align-items: center; /* Vertical center */
                justify-content: center; /* Horizontal center */
                padding: 2rem 0;
            }

            .auth-card {
                background: white;
                border-radius: 1rem;
                border: none;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            }

            .btn-primary {
                background-color: #764ba2;
                border-color: #764ba2;
            }

            .btn-primary:hover {
                background-color: #5a3782;
                border-color: #5a3782;
            }
        </style>
        {% block style %}{% endblock style %}
    </head>

    <body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
                <div class="container">
                    <a class="navbar-brand fw-bold" href="#">TreadMarket</a>
                </div>
            </nav>

            <div class="container mt-3">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{message.tags}} alert-dismissible fade show border-0 shadow-sm rounded-4">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            </div>
        </header>

        <main>
            <div class="container">
                <div class="row justify-content-center w-100 m-0">
                    <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                        {% block content %}
                        {% endblock content %}
                    </div>
                </div>
            </div>
        </main>

        <footer class="text-white-50 text-center py-3">
            <small>&copy; 2024 TreadMarket. All rights reserved.</small>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
        
        {% block script %}{% endblock script %}
    </body>
</html>
